<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOVA — AI Learning Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080810;
  --surface: #0f0f1a;
  --surface2: #161625;
  --surface3: #1e1e30;
  --border: #252538;
  --border2: #2e2e48;
  --accent: #6c63ff;
  --accent-glow: rgba(108,99,255,0.2);
  --gold: #f0c060;
  --teal: #50e3c2;
  --pink: #ff6b9d;
  --text: #eaeaf8;
  --muted: #6060a0;
  --danger: #ff5c5c;
  --radius: 14px;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  display: flex;
  flex-direction: column;
}

/* ambient glow */
body::after {
  content:'';
  position:fixed;
  top:-300px; left:50%; transform:translateX(-50%);
  width:800px; height:800px;
  background: radial-gradient(circle, rgba(108,99,255,0.06) 0%, transparent 65%);
  pointer-events:none; z-index:0;
}

/* ══ HEADER ══ */
header {
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 16px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  z-index:20; flex-shrink:0;
}
.logo { display:flex; align-items:center; gap:10px; }
.logo-orb {
  width:34px; height:34px;
  background: linear-gradient(135deg,#6c63ff,#50e3c2);
  border-radius:10px;
  display:flex; align-items:center; justify-content:center;
  font-size:17px;
  box-shadow: 0 0 16px rgba(108,99,255,0.4);
}
.logo-name {
  font-family:'Syne',sans-serif;
  font-weight:800; font-size:19px;
  background:linear-gradient(90deg,#6c63ff,#a89cff);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.logo-tag { font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:.15em; }

.hdr-right { display:flex; align-items:center; gap:8px; }
.hdr-btn {
  padding:5px 11px; border-radius:8px;
  border:1px solid var(--border2);
  background:var(--surface2); color:var(--muted);
  font-size:11px; cursor:pointer;
  font-family:'DM Sans',sans-serif; transition:all .2s;
  white-space:nowrap;
}
.hdr-btn:hover { border-color:var(--accent); color:var(--accent); }
.hdr-btn.active { border-color:var(--teal); color:var(--teal); background:rgba(80,227,194,.08); }
.status-orb {
  width:8px; height:8px; border-radius:50%;
  background:var(--muted); transition:all .3s;
}
.status-orb.live { background:var(--teal); box-shadow:0 0 8px var(--teal); }

/* ══ SUBJECT TABS ══ */
.subject-bar {
  display:flex; gap:6px; padding:8px 14px;
  background:var(--surface); border-bottom:1px solid var(--border);
  overflow-x:auto; flex-shrink:0; scrollbar-width:none;
  z-index:10;
}
.subject-bar::-webkit-scrollbar { display:none; }
.sub-chip {
  display:flex; align-items:center; gap:5px;
  padding:5px 13px; border-radius:18px;
  border:1px solid var(--border); background:var(--surface2);
  color:var(--muted); font-size:11.5px;
  cursor:pointer; white-space:nowrap; transition:all .2s;
  font-family:'DM Sans',sans-serif; flex-shrink:0;
}
.sub-chip:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-glow); }
.sub-chip.active { border-color:var(--accent); color:var(--accent); background:var(--accent-glow); }
.sub-chip .dot { width:6px; height:6px; border-radius:50%; background:currentColor; opacity:.6; }

/* ══ CHAT ══ */
.chat-wrap { flex:1; overflow-y:auto; padding:16px 14px; display:flex; flex-direction:column; gap:14px; scroll-behavior:smooth; }
.chat-wrap::-webkit-scrollbar { width:3px; }
.chat-wrap::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }

/* welcome */
.welcome {
  background:linear-gradient(135deg,rgba(108,99,255,.12),rgba(80,227,194,.06));
  border:1px solid rgba(108,99,255,.25); border-radius:16px;
  padding:18px; text-align:center;
}
.welcome .orb {
  width:52px; height:52px;
  background:linear-gradient(135deg,var(--accent),var(--teal));
  border-radius:14px; margin:0 auto 10px;
  display:flex; align-items:center; justify-content:center;
  font-size:24px; box-shadow:0 0 20px rgba(108,99,255,.35);
}
.welcome h2 { font-family:'Syne',sans-serif; font-size:17px; margin-bottom:5px; }
.welcome p { color:var(--muted); font-size:12.5px; line-height:1.6; }
.quick-grid { display:flex; flex-wrap:wrap; gap:7px; justify-content:center; margin-top:13px; }
.q-btn {
  padding:5px 11px; border-radius:8px;
  border:1px solid var(--border2); background:var(--surface2);
  color:var(--text); font-size:11px; cursor:pointer;
  font-family:'DM Sans',sans-serif; transition:all .2s;
}
.q-btn:hover { border-color:var(--gold); color:var(--gold); }

/* messages */
.msg { display:flex; gap:9px; align-items:flex-start; animation:fadeUp .3s ease; }
@keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.msg.user { flex-direction:row-reverse; }
.av {
  width:30px; height:30px; border-radius:9px;
  display:flex; align-items:center; justify-content:center;
  font-size:14px; flex-shrink:0;
}
.msg.ai .av { background:linear-gradient(135deg,var(--accent),#a89cff); }
.msg.user .av { background:linear-gradient(135deg,var(--gold),#f7a04a); }

/* image in message */
.msg-img { max-width:100%; max-height:200px; border-radius:10px; margin-bottom:6px; display:block; }

.bubble {
  max-width:82%; padding:11px 14px;
  border-radius:13px; font-size:13.5px; line-height:1.7;
}
.msg.ai .bubble { background:var(--surface2); border:1px solid var(--border2); border-top-left-radius:3px; }
.msg.user .bubble { background:linear-gradient(135deg,rgba(108,99,255,.28),rgba(108,99,255,.18)); border:1px solid rgba(108,99,255,.35); border-top-right-radius:3px; }
.bubble strong { color:var(--gold); font-weight:600; }
.bubble em { color:var(--teal); font-style:italic; }
.bubble code { background:var(--surface3); padding:1px 5px; border-radius:4px; font-family:monospace; font-size:12px; color:#a89cff; }
.bubble pre { background:var(--surface3); border:1px solid var(--border2); border-radius:8px; padding:10px 12px; margin:8px 0; overflow-x:auto; }
.bubble pre code { background:none; padding:0; color:#c5bcff; font-size:12px; line-height:1.6; }

.fix-box {
  margin-top:9px; padding:9px 11px;
  background:rgba(240,192,96,.07); border:1px solid rgba(240,192,96,.22);
  border-radius:9px; font-size:12.5px;
}
.fix-box .flabel { font-size:9px; text-transform:uppercase; letter-spacing:.1em; color:var(--gold); font-weight:700; margin-bottom:4px; }

.speak-btn {
  display:inline-flex; align-items:center; gap:4px;
  margin-top:7px; padding:3px 9px;
  background:rgba(80,227,194,.07); border:1px solid rgba(80,227,194,.2);
  border-radius:6px; color:var(--teal); font-size:10.5px;
  cursor:pointer; font-family:'DM Sans',sans-serif; transition:all .2s;
}
.speak-btn:hover { background:rgba(80,227,194,.15); }
.speak-btn.active { opacity:.6; }

/* typing */
.typing { display:flex; align-items:center; gap:4px; padding:11px 14px; background:var(--surface2); border:1px solid var(--border2); border-radius:13px; border-top-left-radius:3px; width:fit-content; }
.td { width:5px; height:5px; border-radius:50%; background:var(--muted); animation:tb 1.2s infinite; }
.td:nth-child(2){animation-delay:.2s} .td:nth-child(3){animation-delay:.4s}
@keyframes tb{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-5px);opacity:1}}

/* streaming cursor */
.stream-cursor {
  display:inline-block; width:2px; height:1em;
  background:var(--teal); margin-left:2px;
  vertical-align:middle; border-radius:1px;
  animation:blink .7s infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* copy button on bubbles */
.copy-btn {
  display:inline-flex; align-items:center; gap:3px;
  margin-top:7px; margin-left:6px; padding:3px 9px;
  background:rgba(108,99,255,.08); border:1px solid rgba(108,99,255,.2);
  border-radius:6px; color:var(--muted); font-size:10.5px;
  cursor:pointer; font-family:'DM Sans',sans-serif; transition:all .2s;
}
.copy-btn:hover { color:var(--accent); border-color:var(--accent); }

/* subject color accents */
.sub-chip[data-s='html'].active  { border-color:#f06529; color:#f06529; background:rgba(240,101,41,.1); }
.sub-chip[data-s='css'].active   { border-color:#2965f1; color:#2965f1; background:rgba(41,101,241,.1); }
.sub-chip[data-s='js'].active    { border-color:#f0db4f; color:#f0db4f; background:rgba(240,219,79,.1); }
.sub-chip[data-s='python'].active{ border-color:#4b8bbe; color:#4b8bbe; background:rgba(75,139,190,.1); }
.sub-chip[data-s='accounts'].active{ border-color:#50e3c2; color:#50e3c2; background:rgba(80,227,194,.1); }
.sub-chip[data-s='economics'].active{ border-color:#ff6b9d; color:#ff6b9d; background:rgba(255,107,157,.1); }

/* ══ VOICE MODE OVERLAY ══ */
#voiceOverlay {
  display:none; position:fixed; inset:0;
  background:rgba(8,8,16,.92); backdrop-filter:blur(12px);
  z-index:50; flex-direction:column; align-items:center; justify-content:center; gap:24px;
}
#voiceOverlay.show { display:flex; }
.vo-orb-wrap { position:relative; display:flex; align-items:center; justify-content:center; }
.vo-ring {
  position:absolute; width:120px; height:120px; border-radius:50%;
  border:2px solid rgba(108,99,255,.3);
  animation:ringPulse 2s infinite;
}
.vo-ring:nth-child(2){width:160px;height:160px;animation-delay:.4s;border-color:rgba(108,99,255,.2)}
.vo-ring:nth-child(3){width:200px;height:200px;animation-delay:.8s;border-color:rgba(108,99,255,.1)}
@keyframes ringPulse{0%{transform:scale(1);opacity:1}100%{transform:scale(1.15);opacity:0}}
.vo-orb {
  width:90px; height:90px; border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--teal));
  display:flex; align-items:center; justify-content:center;
  font-size:36px; position:relative; z-index:1;
  box-shadow:0 0 40px rgba(108,99,255,.5);
  transition:all .3s; cursor:pointer;
}
.vo-orb.listening { background:linear-gradient(135deg,var(--pink),#ff8c6b); box-shadow:0 0 40px rgba(255,107,157,.5); }
.vo-orb.speaking { background:linear-gradient(135deg,var(--teal),#5bc8f5); box-shadow:0 0 40px rgba(80,227,194,.5); animation:speakBounce .5s infinite alternate; }
@keyframes speakBounce{from{transform:scale(1)}to{transform:scale(1.06)}}
.vo-status { font-family:'Syne',sans-serif; font-size:16px; color:var(--muted); letter-spacing:.05em; }
.vo-status.listening { color:var(--pink); }
.vo-status.speaking { color:var(--teal); }
.vo-transcript {
  max-width:320px; text-align:center;
  font-size:13px; color:var(--text); line-height:1.6;
  min-height:40px; padding:0 20px;
}
.vo-close {
  padding:9px 24px; border-radius:10px;
  border:1px solid var(--border2); background:var(--surface2);
  color:var(--muted); cursor:pointer; font-family:'DM Sans',sans-serif;
  font-size:13px; transition:all .2s;
}
.vo-close:hover { border-color:var(--danger); color:var(--danger); }

/* ══ INPUT ══ */
.input-zone {
  padding:10px 14px 12px;
  background:var(--surface); border-top:1px solid var(--border);
  flex-shrink:0; z-index:10;
}

/* image preview */
#imgPreview {
  display:none; position:relative;
  margin-bottom:8px; width:fit-content;
}
#imgPreview img { height:60px; border-radius:8px; border:1px solid var(--border2); }
#imgPreview .rm-img {
  position:absolute; top:-6px; right:-6px;
  width:18px; height:18px; border-radius:50%;
  background:var(--danger); color:#fff; border:none;
  font-size:10px; cursor:pointer; display:flex; align-items:center; justify-content:center;
}

.input-row { display:flex; gap:8px; align-items:flex-end; }
.ibox {
  flex:1; background:var(--surface2); border:1px solid var(--border2);
  border-radius:12px; display:flex; align-items:flex-end; gap:6px;
  padding:7px 10px; transition:border-color .2s;
}
.ibox:focus-within { border-color:var(--accent); }
.itxt {
  flex:1; background:none; border:none; outline:none;
  color:var(--text); font-family:'DM Sans',sans-serif; font-size:13.5px;
  resize:none; min-height:20px; max-height:90px; line-height:1.5;
}
.itxt::placeholder { color:var(--muted); }
.icon-btn {
  width:30px; height:30px; border-radius:8px;
  border:1px solid var(--border); background:var(--surface);
  color:var(--muted); cursor:pointer; display:flex; align-items:center;
  justify-content:center; font-size:14px; flex-shrink:0; transition:all .2s;
}
.icon-btn:hover { border-color:var(--accent); color:var(--accent); }
.icon-btn.rec { border-color:var(--danger); color:var(--danger); background:rgba(255,92,92,.1); animation:pulse .9s infinite; }
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,92,92,.3)}50%{box-shadow:0 0 0 5px rgba(255,92,92,0)}}

.send-btn {
  width:42px; height:42px; border-radius:11px;
  border:none; background:linear-gradient(135deg,var(--accent),#a89cff);
  color:#fff; cursor:pointer; font-size:16px;
  display:flex; align-items:center; justify-content:center;
  transition:all .2s; flex-shrink:0;
}
.send-btn:hover { transform:scale(1.06); box-shadow:0 4px 14px rgba(108,99,255,.4); }
.send-btn:disabled { opacity:.35; cursor:not-allowed; transform:none; }

.bottom-bar {
  display:flex; justify-content:space-between; align-items:center;
  margin-top:7px; font-size:10.5px; color:var(--muted);
}
.pills { display:flex; gap:5px; }
.pill {
  padding:2px 8px; border-radius:5px;
  border:1px solid var(--border); background:transparent;
  color:var(--muted); font-size:9.5px; cursor:pointer;
  font-family:'DM Sans',sans-serif; transition:all .2s;
}
.pill.on { border-color:var(--teal); color:var(--teal); background:rgba(80,227,194,.08); }

/* hidden file input */
#fileInput { display:none; }

/* toast */
.toast {
  position:fixed; bottom:75px; left:50%;
  transform:translateX(-50%) translateY(12px);
  background:var(--surface2); border:1px solid var(--danger);
  color:var(--danger); padding:8px 16px; border-radius:9px;
  font-size:12.5px; opacity:0; transition:all .3s; z-index:100; white-space:nowrap;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
.toast.info { border-color:var(--teal); color:var(--teal); }
.toast.ok { border-color:var(--teal); color:var(--teal); }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-orb">🎓</div>
    <div>
      <div class="logo-name">NOVA</div>
      <div class="logo-tag">AI Learning Assistant</div>
    </div>
  </div>
  <div class="hdr-right">
    <button class="hdr-btn" id="voiceModeBtn" onclick="openVoiceMode()">🎙 Voice Mode</button>
    <button class="hdr-btn" id="autoSpeakBtn" onclick="toggleAutoSpeak()">🔊 Speak</button>
    <div class="status-orb" id="statusOrb"></div>
  </div>
</header>

<!-- SUBJECT BAR -->
<div class="subject-bar">
  <button class="sub-chip active" data-s="english" onclick="setSubject(this,'english')"><span class="dot"></span>🇬🇧 English</button>
  <button class="sub-chip" data-s="html" onclick="setSubject(this,'html')"><span class="dot"></span>🌐 HTML</button>
  <button class="sub-chip" data-s="css" onclick="setSubject(this,'css')"><span class="dot"></span>🎨 CSS</button>
  <button class="sub-chip" data-s="js" onclick="setSubject(this,'js')"><span class="dot"></span>⚡ JavaScript</button>
  <button class="sub-chip" data-s="python" onclick="setSubject(this,'python')"><span class="dot"></span>🐍 Python</button>
  <button class="sub-chip" data-s="adca" onclick="setSubject(this,'adca')"><span class="dot"></span>💻 ADCA/DCA</button>
  <button class="sub-chip" data-s="accounts" onclick="setSubject(this,'accounts')"><span class="dot"></span>📊 Accounts</button>
  <button class="sub-chip" data-s="economics" onclick="setSubject(this,'economics')"><span class="dot"></span>📈 Economics</button>
  <button class="sub-chip" data-s="business" onclick="setSubject(this,'business')"><span class="dot"></span>🏪 Business</button>
  <button class="sub-chip" data-s="commerce" onclick="setSubject(this,'commerce')"><span class="dot"></span>💰 Commerce</button>
</div>

<!-- CHAT -->
<div class="chat-wrap" id="chat">
  <div class="welcome">
    <div class="orb">🎓</div>
    <h2>Hi Asif! I'm NOVA 👋</h2>
    <p>Your complete AI learning assistant — English, Coding, Commerce, and more.<br>Type, speak, or upload a photo/PDF of your question!</p>
    <div class="quick-grid">
      <button class="q-btn" onclick="qs('Give me today\'s English lesson')">📅 English Lesson</button>
      <button class="q-btn" onclick="qs('Teach me HTML basics from scratch')">🌐 Learn HTML</button>
      <button class="q-btn" onclick="qs('Explain what is Python with an example')">🐍 Python Intro</button>
      <button class="q-btn" onclick="qs('What is double entry bookkeeping in accounts?')">📊 Accounts</button>
      <button class="q-btn" onclick="qs('Explain demand and supply in economics')">📈 Economics</button>
      <button class="q-btn" onclick="qs('What are the career options after Class 10 Commerce?')">💰 Commerce</button>
    </div>
  </div>
</div>

<!-- VOICE OVERLAY -->
<div id="voiceOverlay">
  <div class="vo-orb-wrap">
    <div class="vo-ring"></div>
    <div class="vo-ring"></div>
    <div class="vo-ring"></div>
    <div class="vo-orb" id="voOrb" onclick="voiceOrbClick()">🎤</div>
  </div>
  <div class="vo-status" id="voStatus">Tap to speak</div>
  <div class="vo-transcript" id="voTranscript">I'm listening… speak your question!</div>
  <button class="vo-close" onclick="closeVoiceMode()">✕ Close Voice Mode</button>
</div>

<!-- INPUT -->
<div class="input-zone">
  <div id="imgPreview">
    <img id="previewImg" src="" alt="preview">
    <button class="rm-img" onclick="removeImage()">✕</button>
  </div>
  <div class="input-row">
    <div class="ibox">
      <textarea class="itxt" id="msgInput" placeholder="Ask anything… or upload a photo 📸" rows="1"
        onkeydown="handleKey(event)" oninput="autoH(this)"></textarea>
      <button class="icon-btn" onclick="document.getElementById('fileInput').click()" title="Upload photo/PDF">📎</button>
      <button class="icon-btn" id="micBtn" onclick="quickMic()" title="Voice input">🎤</button>
    </div>
    <button class="send-btn" id="sendBtn" onclick="send()">➤</button>
  </div>
  <div class="bottom-bar">
    <span>Enter to send · Shift+Enter new line</span>
    <div class="pills">
      <button class="pill on" id="grammarPill" onclick="togglePill('grammar',this)">✓ Grammar</button>
      <button class="pill on" id="banglaExplainPill" onclick="togglePill('bangla',this)">বাং Explain</button>
      <button class="pill" id="codeModePill" onclick="togglePill('code',this)">{ } Code Mode</button>
    </div>
  </div>
</div>

<input type="file" id="fileInput" accept="image/*,application/pdf" onchange="handleFile(event)">
<div class="toast" id="toast"></div>

<script>
// ── CONFIG ──
const API_KEY = "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";
const API_URL = "https://openrouter.ai/api/v1/chat/completions";
const VISION_MODEL = "moonshotai/kimi-vl-a3b-thinking:free";
const TEXT_MODEL   = "meta-llama/llama-4-maverick:free";

// ── STATE ──
let history = [];
let subject = 'english';
let grammar = true, banglaExplain = true, codeMode = false;
let autoSpeak = false;
let voiceActive = false;
let isListening = false, isSpeaking = false;
let recognition = null;
let pendingImage = null; // {base64, mime}

// ── SYSTEM PROMPTS ──
const SUBJECT_PROMPTS = {
  english: `You are NOVA — a warm, human English teacher for Asif (17yr, West Bengal). 
Teach English naturally. ${grammar?'Add "📝 Grammar Fix:" section if user makes mistakes.':''} 
${banglaExplain?'Explain difficult concepts briefly in Bengali (বাংলা) when needed.':''}
Use **bold** for key words, *italics* for examples. Always end with a practice question or exercise. Be encouraging and human — never robotic.`,

  html: `You are NOVA — an expert HTML teacher for Asif (17yr student, beginner-intermediate).
Teach HTML clearly with proper code examples. Use \`inline code\` and \`\`\`code blocks\`\`\` for all code.
${banglaExplain?'Explain concepts in Bengali briefly when needed.':''}
Build from basics. Give mini exercises. Be encouraging.`,

  css: `You are NOVA — a CSS teacher for Asif. Teach CSS with visual examples and code blocks.
Explain selectors, properties, flexbox, grid etc. clearly.

// ── QUICK START ──
function qs(t){ document.getElementById('msgInput').value=t; send(); }

// ── FILE HANDLING ──
function handleFile(e) {
  const file = e.target.files[0];
  if(!file) return;
  e.target.value='';

  if(file.type === 'application/pdf') {
    // For PDF — just send text note
    pendingImage = null;
    document.getElementById('msgInput').value = `[I uploaded a PDF: ${file.name}] Please help me with this document.`;
    showToast('PDF detected — describe your question about it!','info');
    return;
  }

  if(!file.type.startsWith('image/')) { showToast('Please upload an image or PDF.'); return; }

  const reader = new FileReader();
  reader.onload = (ev) => {
    const b64 = ev.target.result.split(',')[1];
    pendingImage = { base64: b64, mime: file.type };
    document.getElementById('previewImg').src = ev.target.result;
    document.getElementById('imgPreview').style.display = 'block';
    showToast('Image added! Type your question or send directly.','ok');
  };
  reader.readAsDataURL(file);
}

function removeImage() {
  pendingImage = null;
  document.getElementById('imgPreview').style.display = 'none';
  document.getElementById('previewImg').src = '';
}

// ── SEND with STREAMING ──
async function send() {
  const input = document.getElementById('msgInput');
  const text  = input.value.trim();
  if(!text && !pendingImage) return;

  input.value=''; autoH(input);
  document.getElementById('sendBtn').disabled = true;
  document.getElementById('statusOrb').className = 'status-orb';

  // build user content
  let userContent;
  let userDisplay = text || '(Sent an image)';

  if(pendingImage) {
    userContent = [
      { type:'image_url', image_url:{ url:`data:${pendingImage.mime};base64,${pendingImage.base64}` } },
      { type:'text', text: text || `Analyze this image and help me understand it clearly. Subject context: ${subject}.` }
    ];
    userDisplay = `<img src="data:${pendingImage.mime};base64,${pendingImage.base64}" class="msg-img">${text ? '<br>'+text : ''}`;
  } else {
    userContent = text;
  }

  addMsg('user', userDisplay, '');
  history.push({ role:'user', content: userContent });

  const tid = showTyping();
  removeImage();

  try {
    const messages = [
      { role:'system', content: getSysPrompt() },
      ...history
    ];

    // Fallback model list
    const textModels = [
      'meta-llama/llama-4-maverick:free',
      'meta-llama/llama-4-scout:free',
      'meta-llama/llama-3.3-70b-instruct:free',
      'mistralai/mistral-small-3.1-24b-instruct:free',
      'openrouter/free'
    ];
    const visionModels = [
      'moonshotai/kimi-vl-a3b-thinking:free',
      'meta-llama/llama-4-maverick:free',
      'openrouter/free'
    ];
    const modelList = pendingImage ? visionModels : textModels;

    let res, data, reply;
    let lastError = '';
    for(const model of modelList) {
      try {
        res = await fetch(API_URL, {
          method:'POST',
          headers:{
            'Content-Type':'application/json',
            'Authorization':`Bearer ${API_KEY}`,
            'HTTP-Referer':'https://nova-learning.app',
            'X-Title':'NOVA AI Teacher'
          },
          body: JSON.stringify({ model, max_tokens: 800, messages })
        });
        if(!res.ok){ const e=await res.json().catch(()=>({})); lastError=e.error?.message||`Error ${res.status}`; continue; }
        data = await res.json();
        reply = data.choices?.[0]?.message?.content || '';
        if(reply) break;
      } catch(e){ lastError=e.message; continue; }
    }
    if(!reply) throw new Error(lastError || 'All models failed');

    removeTyping(tid);

    document.getElementById('statusOrb').className = 'status-orb live';
    history.push({ role:'assistant', content: reply });

    // ── Typewriter animation ──
    const { bubble } = createStreamBubble();
    await typewriterAnimate(bubble, reply);
    addMsgButtons(bubble, reply);

    if(autoSpeak) speak(reply);
    if(voiceActive) speakAndListen(reply);

  } catch(err) {
    removeTyping(tid);
    showToast('❌ '+(err.message||'Connection error'));
    addMsg('ai',"⚠️ Couldn't connect. Check your internet and try again.",'');
  }

  document.getElementById('sendBtn').disabled = false;
}

// ── Create streaming AI bubble ──
function createStreamBubble() {
  const chat = document.getElementById('chat');
  const wrap = document.createElement('div');
  wrap.className = 'msg ai';
  wrap.style.animation = 'fadeUp .3s ease';

  const av = document.createElement('div');
  av.className = 'av'; av.textContent = '🎓';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';

  // hidden raw text holder for reference
  const rawHolder = document.createElement('span');
  rawHolder.style.display = 'none';

  wrap.appendChild(av);
  wrap.appendChild(bubble);
  wrap.appendChild(rawHolder);
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
  return { bubble, rawHolder };
}

// ── Typewriter animation ──
async function typewriterAnimate(bubble, rawText) {
  const chat = document.getElementById('chat');
  const words = rawText.split(' ');
  let built = '';
  const delay = ms => new Promise(r => setTimeout(r, ms));

  for(let i = 0; i < words.length; i++) {
    built += (i === 0 ? '' : ' ') + words[i];
    bubble.innerHTML = formatText(built);
    const cur = document.createElement('span');
    cur.className = 'stream-cursor';
    bubble.appendChild(cur);
    chat.scrollTop = chat.scrollHeight;
    const w = words[i];
    const isPunct = /[.!?]$/.test(w);
    await delay(isPunct ? 65 : 20);
  }
  bubble.innerHTML = formatText(rawText);
  chat.scrollTop = chat.scrollHeight;
}

// ── Add action buttons after streaming done ──
function addMsgButtons(bubble, rawText) {
  const br = document.createElement('br');
  bubble.appendChild(br);

  // Listen button
  const speakBtn = document.createElement('button');
  speakBtn.className = 'speak-btn';
  speakBtn.innerHTML = '🔊 Listen';
  let on = false;
  speakBtn.onclick = () => {
    if(on){ window.speechSynthesis.cancel(); on=false; speakBtn.innerHTML='🔊 Listen'; speakBtn.classList.remove('active'); }
    else {
      const u = speak(rawText);
      on=true; speakBtn.innerHTML='⏹ Stop'; speakBtn.classList.add('active');
      if(u) u.onend=()=>{ on=false; speakBtn.innerHTML='🔊 Listen'; speakBtn.classList.remove('active'); };
    }
  };

  // Copy button
  const copyBtn = document.createElement('button');
  copyBtn.className = 'copy-btn';
  copyBtn.innerHTML = '📋 Copy';
  copyBtn.onclick = () => {
    navigator.clipboard.writeText(rawText).then(()=>{
      copyBtn.innerHTML = '✓ Copied!';
      setTimeout(()=>{ copyBtn.innerHTML='📋 Copy'; }, 2000);
    });
  };

  bubble.appendChild(speakBtn);
  bubble.appendChild(copyBtn);
}

// ── FORMAT TEXT ──
function formatText(t) {
  // code blocks
  t = t.replace(/```(\w*)\n?([\s\S]*?)```/g, (_,lang,code)=>
    `<pre><code>${code.trim().replace(/</g,'&lt;').replace(/>/g,'&gt;')}</code></pre>`
  );
  // inline code
  t = t.replace(/`([^`]+)`/g,'<code>$1</code>');
  // bold
  t = t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
  // italic
  t = t.replace(/\*(.*?)\*/g,'<em>$1</em>');
  // grammar fix box
  t = t.replace(/📝 Grammar Fix:([\s\S]*?)(?=\n\n|$)/g,(_,c)=>
    `<div class="fix-box"><div class="flabel">📝 Grammar Fix</div>${c.trim()}</div>`
  );
  // newlines
  t = t.replace(/\n/g,'<br>');
  return t;
}

// ── ADD MESSAGE (user side only; AI uses streaming bubble) ──
function addMsg(role, html, raw) {
  const chat = document.getElementById('chat');
  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;

  const av = document.createElement('div');
  av.className = 'av';
  av.textContent = role==='ai'?'🎓':'😊';

  const bub = document.createElement('div');
  bub.className = 'bubble';
  bub.innerHTML = html;

  // For non-streaming AI messages (errors, greetings)
  if(role==='ai' && raw) {
    addMsgButtons(bub, raw);
  }

  wrap.appendChild(av); wrap.appendChild(bub);
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
}

// ── TYPING ──
function showTyping() {
  const chat = document.getElementById('chat');
  const w = document.createElement('div');
  w.className='msg ai'; w.id='tp-'+Date.now();
  const a=document.createElement('div'); a.className='av'; a.textContent='🎓';
  const t=document.createElement('div'); t.className='typing';
  t.innerHTML='<div class="td"></div><div class="td"></div><div class="td"></div>';
  w.appendChild(a); w.appendChild(t);
  chat.appendChild(w); chat.scrollTop=chat.scrollHeight;
  return w.id;
}
function removeTyping(id){ const e=document.getElementById(id); if(e)e.remove(); }

// ══ VOICE FUNCTIONS ══

// Simple mic in input box (no click sound)
function quickMic() {
  const hasSR = 'webkitSpeechRecognition' in window || 'SpeechRecognition' in window;
  if(!hasSR){ showToast('Use Chrome for voice!'); return; }
  if(isListening && recognition){ recognition.stop(); return; }

  const SR = window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang='en-IN';
  recognition.continuous=false;
  recognition.interimResults=false;

  // Suppress the default browser sound by starting immediately
  recognition.onstart=()=>{
    isListening=true;
    document.getElementById('micBtn').classList.add('rec');
    document.getElementById('micBtn').textContent='⏹';
  };
  recognition.onresult=(e)=>{
    document.getElementById('msgInput').value = e.results[0][0].transcript;
    autoH(document.getElementById('msgInput'));
  };
  recognition.onend=()=>{
    isListening=false;
    document.getElementById('micBtn').classList.remove('rec');
    document.getElementById('micBtn').textContent='🎤';
  };
  recognition.onerror=()=>{
    isListening=false;
    document.getElementById('micBtn').classList.remove('rec');
    document.getElementById('micBtn').textContent='🎤';
  };
  recognition.start();
}

// ── HUMAN-LIKE VOICE ──
function speak(rawText) {
  if(!('speechSynthesis' in window)) return null;
  window.speechSynthesis.cancel();

  const clean = rawText
    .replace(/📝 Grammar Fix:[\s\S]*$/m,'')
    .replace(/```[\s\S]*?```/g,'[code block]')
    .replace(/\*\*(.*?)\*\*/g,'$1')
    .replace(/\*(.*?)\*/g,'$1')
    .replace(/`([^`]+)`/g,'$1')
    .replace(/<[^>]*>/g,'')
    .replace(/[#>\-•]/g,'')
    .replace(/\[code block\]/g,'Here is the code.')
    .trim();

  const utt = new SpeechSynthesisUtterance(clean);
  const voices = window.speechSynthesis.getVoices();

  // Priority: natural sounding voices
  const want = [
    'Microsoft Aria Online (Natural) - English (United States)',
    'Microsoft Jenny Online (Natural) - English (United States)',
    'Microsoft Zira - English (United States)',
    'Google UK English Female',
    'Google US English',
    'Samantha','Karen','Moira','Tessa','Victoria'
  ];
  let chosen=null;
  for(const n of want){ chosen=voices.find(v=>v.name===n); if(chosen)break; }
  if(!chosen) chosen=voices.find(v=>v.lang.startsWith('en')&&/female|woman/i.test(v.name));
  if(!chosen) chosen=voices.find(v=>v.lang==='en-US'||v.lang==='en-GB');
  if(!chosen) chosen=voices.find(v=>v.lang.startsWith('en'));
  if(chosen) utt.voice=chosen;

  utt.lang='en-US';
  utt.rate=0.88;   // natural, relaxed pace
  utt.pitch=1.08;  // warm friendly pitch
  utt.volume=1;

  window.speechSynthesis.speak(utt);
  return utt;
}

function toggleAutoSpeak() {
  autoSpeak=!autoSpeak;
  const b=document.getElementById('autoSpeakBtn');
  b.classList.toggle('active',autoSpeak);
  b.textContent=autoSpeak?'🔊 ON':'🔊 Speak';
  showToast(autoSpeak?'Auto-speak enabled!':'Auto-speak off.','info');
}

// ══ VOICE MODE (Hands-free) ══
function openVoiceMode() {
  document.getElementById('voiceOverlay').classList.add('show');
  voiceActive=true;
  setVoState('idle');
  // small delay then start listening
  setTimeout(startVoiceListening, 500);
}

function closeVoiceMode() {
  document.getElementById('voiceOverlay').classList.remove('show');
  voiceActive=false;
  if(recognition) recognition.stop();
  window.speechSynthesis.cancel();
  isListening=false; isSpeaking=false;
}

function voiceOrbClick() {
  if(isSpeaking){ window.speechSynthesis.cancel(); isSpeaking=false; startVoiceListening(); }
  else if(isListening){ recognition&&recognition.stop(); }
  else { startVoiceListening(); }
}

function startVoiceListening() {
  if(!voiceActive) return;
  const hasSR='webkitSpeechRecognition' in window||'SpeechRecognition' in window;
  if(!hasSR){ showToast('Use Chrome for voice mode!'); return; }

  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition=new SR();
  recognition.lang='en-IN';
  recognition.continuous=false;
  recognition.interimResults=true;

  recognition.onstart=()=>{
    isListening=true;
    setVoState('listening');
  };
  recognition.onresult=(e)=>{
    const t=Array.from(e.results).map(r=>r[0].transcript).join('');
    document.getElementById('voTranscript').textContent=t;
    if(e.results[e.results.length-1].isFinal) {
      document.getElementById('msgInput').value=t;
    }
  };
  recognition.onend=()=>{
    isListening=false;
    const txt=document.getElementById('msgInput').value.trim();
    if(txt && voiceActive) {
      setVoState('thinking');
      document.getElementById('voTranscript').textContent='Processing: "'+txt+'"';
      send(); // this will call speakAndListen after reply
    } else {
      setVoState('idle');
      document.getElementById('voTranscript').textContent='Tap the mic to speak again.';
    }
  };
  recognition.onerror=()=>{
    isListening=false;
    setVoState('idle');
    document.getElementById('voTranscript').textContent='Tap to try again.';
  };
  recognition.start();
}

function speakAndListen(text) {
  if(!voiceActive) return;
  setVoState('speaking');
  document.getElementById('voTranscript').textContent='NOVA is speaking…';
  isSpeaking=true;
  const utt=speak(text);
  if(utt){
    utt.onend=()=>{
      isSpeaking=false;
      if(voiceActive){ setTimeout(startVoiceListening,800); }
    };
  } else {
    isSpeaking=false;
    if(voiceActive) setTimeout(startVoiceListening,800);
  }
}

function setVoState(state) {
  const orb=document.getElementById('voOrb');
  const status=document.getElementById('voStatus');
  orb.className='vo-orb';
  status.className='vo-status';
  if(state==='listening'){
    orb.classList.add('listening'); orb.textContent='🔴';
    status.classList.add('listening'); status.textContent='Listening…';
  } else if(state==='speaking'){
    orb.classList.add('speaking'); orb.textContent='🔊';
    status.classList.add('speaking'); status.textContent='NOVA is speaking…';
  } else if(state==='thinking'){
    orb.textContent='⏳'; status.textContent='Thinking…';
  } else {
    orb.textContent='🎤'; status.textContent='Tap to speak';
  }
}

// ── UTILS ──
function handleKey(e){ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); send(); } }
function autoH(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,90)+'px'; }

function showToast(msg,type='error'){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className=`toast ${type} show`;
  setTimeout(()=>t.classList.remove('show'),3000);
}

// Preload voices
if('speechSynthesis' in window){
  window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices();
  window.speechSynthesis.getVoices();
}
